[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-q --ignore=tests/_tmp --ignore=tests/_self_check --ignore=tests/_pytest_tmp --ignore=tests/_generated -p no:cacheprovider"

[tool.ruff]
line-length = 140
target-version = "py312"
exclude = ["frontend", "data/raw", "reports", "models", "tests/_tmp", "tests/_self_check"]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]
ignore = ["E501"]

[tool.mypy]
python_version = "3.12"
ignore_missing_imports = true
exclude = "(frontend|data/raw|reports|models|tests/_tmp|tests/_self_check)"